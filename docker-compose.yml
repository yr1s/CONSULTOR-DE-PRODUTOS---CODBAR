version: '3.8'

services:
  consulta-preco:
    build: .
    container_name: consulta-preco
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - HOST=0.0.0.0
      - PORT=3000
      - API_KEY=${API_KEY:-}
      - USE_UNACCENT=${USE_UNACCENT:-0}
      - STATEMENT_TIMEOUT_MS=${STATEMENT_TIMEOUT_MS:-10000}
      - CAND_LIMIT=${CAND_LIMIT:-50}
      - RESULT_LIMIT=${RESULT_LIMIT:-200}
      - USE_FUZZY=${USE_FUZZY:-1}
      - FUZZY_MIN_SIM=${FUZZY_MIN_SIM:-0.32}
